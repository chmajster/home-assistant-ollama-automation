generate_automation:
  name: Generate automation
  description: Generate Home Assistant automation YAML from natural language.
  fields:
    description:
      required: true
      selector:
        text:
    alias:
      selector:
        text:
    entity_hints:
      selector:
        object:
    existing_yaml:
      selector:
        text:
    style:
      selector:
        select:
          options:
            - minimalist
            - readable
            - advanced
    template:
      selector:
        select:
          options:
            - swiatla
            - alarm
            - obecnosc
            - ogrzewanie
            - rolety
            - powiadomienia

validate_automation_yaml:
  name: Validate automation YAML
  fields:
    yaml:
      required: true
      selector:
        text:

dry_run_automation:
  name: Dry-run automation
  description: Simulate trigger/condition checks against provided entity states without saving.
  fields:
    yaml:
      required: true
      selector:
        text:
    entity_states:
      description: Optional dictionary of test entity states used for trigger/condition simulation.
      selector:
        object:

explain_automation:
