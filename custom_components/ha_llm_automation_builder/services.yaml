generate_automation:
  name: Generate automation
  description: Generate Home Assistant automation YAML from natural language.
  fields:
    description:
      required: true
      selector:
        text:
    alias:
      selector:
        text:
    entity_hints:
      selector:
        object:
    existing_yaml:
      selector:
        text:
    style:
      selector:
        select:
          options:
            - minimalist
            - readable
            - advanced
    template:
      selector:
        select:
          options:
            - swiatla
            - alarm
            - obecnosc
            - ogrzewanie
            - rolety
            - powiadomienia

validate_automation_yaml:
  name: Validate automation YAML
  fields:
    yaml:
      required: true
      selector:
        text:

dry_run_automation:
  name: Dry-run automation
  description: Simulate trigger/condition checks against provided entity states without saving.
  fields:
    yaml:
      required: true
      selector:
        text:
    entity_states:
      description: Optional dictionary of test entity states used for trigger/condition simulation.
      selector:
        object:

explain_automation:
  name: Explain automation
  fields:
    yaml:
      required: true
      selector:
        text:

improve_automation:
  name: Improve automation
  fields:
    description:
      required: true
      selector:
        text:
    yaml:
      required: true
      selector:
        text:

list_available_models:
  name: List available models
  description: List models from configured provider or from ad-hoc provider endpoint.
  fields:
    provider:
      selector:
        select:
          options:
            - ollama
            - openai_compatible
    base_url:
      selector:
        text:
    ollama_host:
      description: Optional Ollama host/IP. If set for provider=ollama, this will override base_url.
      selector:
        text:
    ollama_port:
      selector:
        number:
          min: 1
          max: 65535
          mode: box
    api_key:
      selector:
        text:
    timeout:
      selector:
        number:
          min: 1
          max: 300
          mode: box

test_provider_connection:
  name: Test provider connection
  description: Test provider connectivity and selected model availability.
  fields:
    provider:
      selector:
        select:
          options:
            - ollama
            - openai_compatible
    base_url:
      selector:
        text:
    ollama_host:
      description: Optional Ollama host/IP. If set for provider=ollama, this will override base_url.
      selector:
        text:
    ollama_port:
      selector:
        number:
          min: 1
          max: 65535
          mode: box
    model:
      selector:
        text:
    api_key:
      selector:
        text:
    timeout:
      selector:
        number:
          min: 1
          max: 300
          mode: box

generate_blueprint:
  name: Generate blueprint
  fields:
    description:
      required: true
      selector:
        text:
