- service: ha_llm_automation_builder.generate_automation
  data:
    description: "Włącz światło w salonie po zachodzie słońca gdy ktoś jest w domu"
    entity_hints:
      - light.salon
      - person.jan
    template: swiatla
    style: readable

- service: ha_llm_automation_builder.validate_automation_yaml
  data:
    yaml: |
      alias: Przyklad
      trigger:
        - platform: state
          entity_id: binary_sensor.drzwi
          to: "on"
      action:
        - service: light.turn_on
          target:
            entity_id: light.korytarz

- service: ha_llm_automation_builder.test_provider_connection
  data:
    provider: ollama
    ollama_host: 192.168.1.50
    ollama_port: 11434
    model: llama3.2:3b

- service: ha_llm_automation_builder.list_available_models
  data:
    provider: ollama
    ollama_host: 192.168.1.50
    ollama_port: 11434

- service: ha_llm_automation_builder.pull_ollama_model
  data:
    provider: ollama
    ollama_host: 192.168.1.50
    ollama_port: 11434
    model: llama3.2:3b

- service: ha_llm_automation_builder.create_automation_from_yaml
  data:
    enabled: false
    yaml: |
      alias: LLM example
      trigger:
        - platform: state
          entity_id: binary_sensor.motion
          to: "on"
      action:
        - service: light.turn_on
          target:
            entity_id: light.kitchen

- service: ha_llm_automation_builder.modify_automation_with_ollama
  data:
    target: llm_example
    description: "Dodaj warunek po zachodzie slonca i opoznienie 10 sekund"
    create_mode: overwrite
    apply_changes: false
